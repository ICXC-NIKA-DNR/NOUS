name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: npm test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # npm test = `tsc --noEmit` + the node:test suite over the .ts sources.
      # No Rust/WebView build needed (that's `tauri build`), so this stays fast
      # and verifies the TypeScript core on Linux, macOS, and Windows.
      - run: npm ci
      - run: npm test

  cargo-deny:
    name: cargo deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Enforces src-tauri/deny.toml: permissive-only license allowlist and
      # RUSTSEC advisories over the full Rust crate tree (M10.5 audit item —
      # the npm tree is audited by hand, this keeps the Rust side honest).
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: src-tauri/Cargo.toml
          command: check
          arguments: --config src-tauri/deny.toml
