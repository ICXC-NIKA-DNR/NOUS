name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: npm test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # npm test = `tsc --noEmit` + the node:test suite over the .ts sources.
      # No Rust/WebView build needed (that's `tauri build`), so this stays fast
      # and verifies the TypeScript core on Linux, macOS, and Windows.
      - run: npm ci
      - run: npm test
